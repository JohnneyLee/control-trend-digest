name: control-theory-trend-digest

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Singapore
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate daily digest
        run: node scripts/generate-daily.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build static site
        run: node scripts/build-site.mjs
        env:
          DIGEST_SITE_URL: ${{ vars.DIGEST_SITE_URL }}

      - name: Commit digest sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily/ public/
          if git diff --cached --quiet; then
            echo "No digest changes"
          else
            git commit -m "Add control theory digest for $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify subscribers
        run: node scripts/notify.mjs
        env:
          DIGEST_SITE_URL: ${{ vars.DIGEST_SITE_URL || steps.deployment.outputs.page_url }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
